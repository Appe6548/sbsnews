<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream - MMC News</title>
  <link rel="stylesheet" href="/css/apple-style.css?v=20260324-1">
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="/" class="brand" aria-label="MMC News 首页"><svg class="nav-logo" width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect width="32" height="32" rx="8" fill="currentColor" opacity="0.12"/><path d="M7 23V9l5.5 8L16 11.5l3.5 5.5L25 9v14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
      <button class="nav-hamburger" type="button" aria-label="菜单" aria-expanded="false">
        <span class="nav-hamburger-line"></span>
        <span class="nav-hamburger-line"></span>
        <span class="nav-hamburger-line"></span>
      </button>
      <ul class="nav-items">
        <li><a href="/news.html">动态</a></li>
        <li><a href="/archive.html">作品</a></li>
        <li><a href="/novel.html">小说</a></li>
        <li><a href="/about.html">关于</a></li>
      </ul>
      <div class="theme-toggle">
        <button class="theme-toggle-button" type="button" aria-label="主题切换"></button>
        <div class="theme-menu">
          <div class="theme-option" data-theme="light">
            <span class="theme-icon" aria-hidden="true"></span>
            <span>浅色模式</span>
          </div>
          <div class="theme-option" data-theme="dark">
            <span class="theme-icon" aria-hidden="true"></span>
            <span>深色模式</span>
          </div>
          <div class="theme-option active" data-theme="system">
            <span class="theme-icon" aria-hidden="true"></span>
            <span>跟随系统</span>
          </div>
        </div>
      </div>
    </div>
  </nav>
  <div class="nav-overlay"></div>

  <main class="main-content">
    <div class="video-info">
      <h1 class="video-title">Dream</h1>
      <div class="video-meta">
        <span>发布于：2025年4月14日</span>
        <span style="margin-left: 16px;">时长：0:25</span>
      </div>
      <div class="video-description">
        <div class="description-content collapsed">在阳光累死之前的幻想</div>
        <span class="toggle-button expand">展开</span>
        <span class="toggle-button collapse" style="display: none;">收起</span>
      </div>
    </div>

    <div class="video-container">
      <video id="video" controls playsinline webkit-playsinline poster="https://r2.oai.works/images/video-images/Dream.png">
        您的浏览器不支持视频播放，请更新至最新版本。
      </video>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p class="footer-text"><a href="https://icp.gov.moe/?keyword=20250941" target="_blank">萌ICP备20250941号</a></p>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const video = document.getElementById('video');
      const videoSrc = 'https://r2.oai.works/Dream.mp4';
      video.src = videoSrc;
      video.load();

      const content = document.querySelector('.description-content');
      const expandBtn = document.querySelector('.toggle-button.expand');
      const collapseBtn = document.querySelector('.toggle-button.collapse');

      function checkOverflow() {
        const isOverflowing = content.scrollHeight > 24;
        expandBtn.style.display = isOverflowing && content.classList.contains('collapsed') ? 'inline-block' : 'none';
      }

      expandBtn.addEventListener('click', () => {
        content.classList.remove('collapsed');
        expandBtn.style.display = 'none';
        collapseBtn.style.display = 'block';
      });

      collapseBtn.addEventListener('click', () => {
        content.classList.add('collapsed');
        collapseBtn.style.display = 'none';
        expandBtn.style.display = 'inline-block';
      });

      window.addEventListener('load', checkOverflow);
      window.addEventListener('resize', checkOverflow);
    });
  </script>

  <script src="/js/apple-theme.js?v=20260324-1"></script>
</body>
</html>
