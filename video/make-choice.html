<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/css/apple-style.css?v=20260324-1">
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="/" class="brand" aria-label="MMC News 首页"><svg class="nav-logo" width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect width="32" height="32" rx="8" fill="currentColor" opacity="0.12"/><path d="M8 27C6 27 5 25.5 5 24L5 14 8.5 5 13 14 16 11.5 19 14 23.5 5 27 14 27 24C27 25.5 26 27 24 27Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/><circle cx="20" cy="19" r="1.5" fill="currentColor"/><path d="M13.5 23Q15 25 16 23 17 25 18.5 23" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></a>
      <button class="nav-hamburger" type="button" aria-label="菜单" aria-expanded="false">
        <span class="nav-hamburger-line"></span>
        <span class="nav-hamburger-line"></span>
        <span class="nav-hamburger-line"></span>
      </button>
      <ul class="nav-items">
        <li><a href="/news.html">新闻</a></li>
        <li><a href="/archive.html">往期内容</a></li>
        <li><a href="/novel.html">小说</a></li>
        <li><a href="/about.html">关于我们</a></li>
      </ul>
      <div class="theme-toggle">
        <button class="theme-toggle-button" type="button" aria-label="主题切换"></button>
        <div class="theme-menu">
          <div class="theme-option" data-theme="light">
            <span class="theme-icon" aria-hidden="true"></span>
            <span>浅色模式</span>
          </div>
          <div class="theme-option" data-theme="dark">
            <span class="theme-icon" aria-hidden="true"></span>
            <span>深色模式</span>
          </div>
          <div class="theme-option active" data-theme="system">
            <span class="theme-icon" aria-hidden="true"></span>
            <span>跟随系统</span>
          </div>
        </div>
      </div>
    </div>
  </nav>
  <div class="nav-overlay"></div>

  <main class="main-content">
    <div class="video-info">
      <h1 class="video-title">选择你的零模配置</h1>
      <div class="video-meta">
        <span>发布于：2024年2月22日</span>
        <span style="margin-left: 16px;">时长：0:29</span>
      </div>
      <div class="video-description">
        <div class="description-content collapsed">Make Your Choice</div>
        <span class="toggle-button expand">展开</span>
        <span class="toggle-button collapse" style="display: none;">收起</span>
      </div>
    </div>

    <div class="video-container">
      <video id="video" controls></video>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p class="footer-text"><a href="https://icp.gov.moe/?keyword=20250941" target="_blank">萌ICP备20250941号</a></p>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const video = document.getElementById('video');
      const videoSrc = 'https://r2.oai.works/%E9%80%89%E6%8B%A9%E4%BD%A0%E7%9A%84%E9%9B%B6%E6%A8%A1%E9%85%8D%E7%BD%AE.mp4';
      video.src = videoSrc;
      video.load();

      // 简介展开/收起功能
      const content = document.querySelector('.description-content');
      const expandBtn = document.querySelector('.toggle-button.expand');
      const collapseBtn = document.querySelector('.toggle-button.collapse');

      // 检查内容是否需要展开按钮
      function checkOverflow() {
        const isOverflowing = content.scrollHeight > 24;
        expandBtn.style.display = isOverflowing && content.classList.contains('collapsed') ? 'inline-block' : 'none';
      }

      // 展开内容
      expandBtn.addEventListener('click', () => {
        content.classList.remove('collapsed');
        expandBtn.style.display = 'none';
        collapseBtn.style.display = 'block';
      });

      // 收起内容
      collapseBtn.addEventListener('click', () => {
        content.classList.add('collapsed');
        collapseBtn.style.display = 'none';
        expandBtn.style.display = 'inline-block';
      });

      // 页面加载后检查是否需要展开按钮
      window.addEventListener('load', checkOverflow);
      // 窗口大小改变时重新检查
      window.addEventListener('resize', checkOverflow);
    });
  </script>

  <script src="/js/apple-theme.js?v=20260324-1"></script>
</body>
</html>
