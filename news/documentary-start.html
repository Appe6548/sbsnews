        <h1 class="article-title">阳光年度纪录片制作启动公告</h1>
        <div class="article-meta">2024 年 4 月 1 日 · MMC News</div>
      </header>
      <div class="article-content">
        <p>很高兴的宣布——阳光年度纪录片已正式投入制作！</p>

        <p>本次纪录片将揭露阳光的恐怖统治，记录这所学校不为人知的一面。我们的摄制组已经开始收集素材，力求为大家呈现一部真实的作品。</p>

        <div class="highlight-callout">
          <strong>制作时间表：</strong>初步预计将于四月中旬左右发布预告片，并于四月晚些时候推出正片。
        </div>

        <p>敬请期待。</p>
