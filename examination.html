<style>
.exam-hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: calc(var(--nav-height) + 48px) 24px 80px;
  position: relative;
  background:
    radial-gradient(900px circle at 50% 0%, var(--color-surface-soft), transparent 70%),
    var(--color-canvas);
}

.exam-hero-content {
  max-width: 1100px;
  width: 100%;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.exam-hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--color-primary);
  margin-bottom: 24px;
  animation: fadeInUp 0.85s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
  opacity: 0;
}
.exam-hero-eyebrow::before,
.exam-hero-eyebrow::after {
  content: "";
  width: 22px;
  height: 1px;
  background: var(--color-primary);
}

.exam-hero-title {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 6.4vw, 4.4rem);
  font-weight: 500;
  color: var(--color-ink);
  margin-bottom: 28px;
  letter-spacing: -0.025em;
  line-height: 1.05;
  animation: fadeInUp 0.85s cubic-bezier(0.25, 0.1, 0.25, 1) 0.12s forwards;
  opacity: 0;
}

.exam-motivational {
  font-family: var(--font-body);
  font-size: clamp(1.1rem, 2.6vw, 1.5rem);
  font-weight: 400;
  color: var(--color-body-strong);
  margin-bottom: 8px;
  line-height: 1.5;
  animation: fadeInUp 0.85s cubic-bezier(0.25, 0.1, 0.25, 1) 0.24s forwards;
  opacity: 0;
  max-width: 760px;
}

.exam-blessing {
  font-family: var(--font-body);
  font-size: clamp(1rem, 2.2vw, 1.2rem);
  font-weight: 400;
  color: var(--color-muted);
  margin-bottom: 40px;
  line-height: 1.5;
  animation: fadeInUp 0.85s cubic-bezier(0.25, 0.1, 0.25, 1) 0.36s forwards;
  opacity: 0;
  max-width: 760px;
}

.exam-image-container {
  margin-top: 32px;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  animation: fadeInUp 0.85s cubic-bezier(0.25, 0.1, 0.25, 1) 0.5s forwards;
  opacity: 0;
}

.exam-image-container img {
  width: auto;
  max-width: 100%;
  height: auto;
  max-height: 78vh;
  border-radius: var(--r-xl);
  border: 1px solid var(--color-hairline);
  object-fit: contain;
  background: var(--color-surface-card);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .exam-hero {
    padding: calc(var(--nav-height) + 32px) 16px 56px;
  }
}
</style>
<script>
window.addEventListener('DOMContentLoaded', () => {
  checkExamTime();
  checkImageLoad();
});

function checkExamTime() {
  const examDate = new Date('2025-06-07T00:00:00+08:00');
  const now = new Date();
  if (now < examDate) {
    window.location.href = '/';
  }
}

function checkImageLoad() {
  const img = document.querySelector('.exam-image-container img');
  if (!img) return;
  img.addEventListener('error', function () {
    if (this.src.endsWith('.png')) {
      this.src = 'skmtopus_top_release.webp';
    } else if (this.src.endsWith('.webp')) {
      this.src = 'skmt.jpg';
    }
  });
}
</script>

          </div>

  <section class="exam-hero">

      <p class="exam-hero-eyebrow">2025 · 高考</p>
      <h1 class="exam-hero-title">If not me, who?<br>If not now, when?</h1>
      <p class="exam-motivational">十载寒窗为今朝，舍我其谁敢争锋？</p>
      <p class="exam-blessing">青春无悔赴考场，此时不搏更何时？</p>

      <div class="exam-image-container">
        <img src="skmtopus_top_release.png" alt="Liberation and Freedom" loading="lazy" onerror="this.onerror=null; this.src='skmt.jpg';">
      </div>
    </div>
